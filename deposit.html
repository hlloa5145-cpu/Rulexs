<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex | إيداع الأموال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #ffffff; color: #1f2937; margin: 0; }
        
        .rolex-card {
            background: linear-gradient(145deg, #f9fafb, #ffffff);
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 10px 10px 20px #e5e7eb, -10px -10px 20px #ffffff;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .network-btn {
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .network-btn.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-5px);
        }
        .copy-btn {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            box-shadow: 0 10px 15px rgba(59, 130, 246, 0.2);
        }
        .glass-input {
            background: rgba(243, 244, 246, 0.5);
            backdrop-filter: blur(5px);
            border: 1px inset rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="pb-10">

    <div class="p-6 flex items-center gap-4">
        <button onclick="window.location.href='index.html'" class="w-10 h-10 rolex-card flex items-center justify-center text-blue-600 font-bold">
            →
        </button>
        <h1 class="text-xl font-black text-gray-800">شحن الرصيد 💎</h1>
    </div>

    <div class="px-6 mb-6">
        <p class="text-sm text-gray-400">اختر الشبكة المناسبة وانسخ العنوان لإتمام عملية الإيداع وبدء الربح التراكمي.</p>
    </div>

    <div class="px-6 grid grid-cols-3 gap-3 mb-8">
        <button onclick="selectNetwork('TRC20', 'TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB')" id="btn-TRC20" class="network-btn rolex-card p-4 flex flex-col items-center active">
            <span class="text-2xl mb-1">⚡</span>
            <span class="text-[10px] font-bold">TRC20</span>
        </button>
        <button onclick="selectNetwork('BEP20', '0xd1e87dd1fabb7b64842dc7b00deb9c0db3aa55ac')" id="btn-BEP20" class="network-btn rolex-card p-4 flex flex-col items-center">
            <span class="text-2xl mb-1">🟡</span>
            <span class="text-[10px] font-bold">BEP20</span>
        </button>
        <button onclick="selectNetwork('ERC20', '0xd1e87dd1fabb7b64842dc7b00deb9c0db3aa55ac')" id="btn-ERC20" class="network-btn rolex-card p-4 flex flex-col items-center">
            <span class="text-2xl mb-1">💠</span>
            <span class="text-[10px] font-bold">ERC20</span>
        </button>
    </div>

    <div class="px-6">
        <div class="rolex-card p-8 text-center border-t-4 border-blue-400">
            <div class="mb-4">
                <span id="network-title" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">شبكة TRC20</span>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-2xl break-all font-mono text-sm text-gray-600 mb-6 border border-dashed border-blue-200">
                <span id="wallet-address">TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB</span>
            </div>

            <button onclick="copyAddress()" class="copy-btn w-full text-white p-4 rounded-2xl font-bold active:scale-95 transition-all">
                نسخ العنوان 📋
            </button>
        </div>
    </div>

    <div class="px-6 mt-10">
        <h3 class="font-bold text-gray-700 mb-4">إرسال إثبات التحويل</h3>
        <div class="rolex-card p-6">
            <div class="mb-4">
                <label class="text-[10px] text-gray-400 font-bold block mb-2 uppercase tracking-widest">المبلغ المرسل (USDT)</label>
                <input type="number" placeholder="0.00" class="w-full glass-input p-4 rounded-xl text-blue-600 font-bold outline-none">
            </div>
            
            <div class="mb-6">
                <label class="text-[10px] text-gray-400 font-bold block mb-2 uppercase tracking-widest">صورة التحويل (Screenshot)</label>
                <div class="w-full h-32 border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center text-gray-300">
                    <span class="text-3xl mb-1">📸</span>
                    <span class="text-[10px]">اضغط لرفع الصورة</span>
                    <input type="file" class="hidden" id="fileInput">
                </div>
            </div>

            <button onclick="alert('تم إرسال طلبك، سيتم التأكيد خلال دقائق!')" class="w-full bg-gray-800 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                تأكيد الإيداع الآن
            </button>
        </div>
    </div>

    <script>
        function selectNetwork(name, address) {
            // تحديث العنوان
            document.getElementById('wallet-address').innerText = address;
            document.getElementById('network-title').innerText = "شبكة " + name;

            // تحديث شكل الأزرار
            document.querySelectorAll('.network-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + name).classList.add('active');
        }

        function copyAddress() {
            const address = document.getElementById('wallet-address').innerText;
            navigator.clipboard.writeText(address);
            alert("تم نسخ العنوان بنجاح: " + address);
        }
    </script>
</body>
</html>
