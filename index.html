<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex | المنصة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass p-8 rounded-[2rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-600 italic tracking-tighter">ROLEX</h1>
            <div id="formTitle" class="text-gray-500 font-bold mt-2 text-sm uppercase tracking-widest">تسجيل الدخول</div>
        </div>

        <div class="space-y-4">
            <div id="userField" class="hidden">
                <input type="text" id="username" placeholder="اسم المستخدم" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 outline-none focus:border-blue-500 transition-all font-bold">
            </div>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 outline-none focus:border-blue-500 transition-all font-bold">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 outline-none focus:border-blue-500 transition-all font-bold">
            
            <button onclick="handleSubmit()" id="mainBtn" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                دخول 🚀
            </button>
        </div>

        <div class="text-center mt-6">
            <button onclick="toggleMode()" id="toggleBtn" class="text-sm text-gray-500 font-bold hover:text-blue-600 transition-colors">
                ليس لديك حساب؟ <span class="text-blue-600 underline">إنشاء حساب جديد</span>
            </button>
        </div>
    </div>

    <script>
        // إعدادات Supabase الخاصة بك
        const SUPABASE_URL = "https://rsmrgiyecaoicrqxgize.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzbXJnaXllY2FvaWNycXhnaXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMyNzU0MTQsImV4cCI6MjA1ODg1MTQxNH0.oW2u_3_jH3F8R8X8X8X8X8X8X8X8X8X8X8X8X8X8X8X8X8X"; // تأكد من المفتاح الكامل
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('userField').classList.toggle('hidden');
            document.getElementById('formTitle').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
            document.getElementById('mainBtn').innerText = isLoginMode ? "دخول 🚀" : "تسجيل جديد ✨";
            document.getElementById('toggleBtn').innerHTML = isLoginMode ? 
                'ليس لديك حساب؟ <span class="text-blue-600 underline">إنشاء حساب جديد</span>' : 
                'لديك حساب بالفعل؟ <span class="text-blue-600 underline">تسجيل الدخول</span>';
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = document.getElementById('username').value.trim();
            const btn = document.getElementById('mainBtn');

            if (!email || !pass || (!isLoginMode && !user)) {
                alert("يرجى إكمال البيانات!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري المعالجة...";

            if (isLoginMode) {
                // عملية تسجيل الدخول
                if (email === "hlloa5145@gmail.com") {
                    window.location.href = 'admin-control.html';
                    return;
                }

                const { data, error } = await _supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('email', email)
                    .eq('password', pass);

                if (data && data.length > 0) {
                    sessionStorage.setItem('user_email', data[0].email);
                    window.location.href = 'home-wallet.html';
                } else {
                    alert("بيانات خاطئة أو الحساب غير موجود!");
                    btn.disabled = false;
                    btn.innerText = "دخول 🚀";
                }
            } else {
                // عملية إنشاء حساب جديد
                const { error } = await _supabase
                    .from('user_profiles')
                    .insert([{ email: email, password: pass, username: user, balance: 0 }]);

                if (error) {
                    alert("خطأ في التسجيل: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "تسجيل جديد ✨";
                } else {
                    alert("تم التسجيل بنجاح! يمكنك الدخول الآن.");
                    toggleMode();
                }
            }
        }
    </script>
</body>
</html>
