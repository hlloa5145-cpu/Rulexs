<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex | نظام الاستثمار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card p-8 rounded-[2rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-600 italic">ROLEX</h1>
            <p id="formTitle" class="text-gray-500 font-bold mt-2">تسجيل الدخول</p>
        </div>

        <div class="space-y-4">
            <div id="userField" class="hidden">
                <input type="text" id="username" placeholder="اسم المستخدم" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 outline-none focus:border-blue-500 transition-all font-bold">
            </div>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 outline-none focus:border-blue-500 transition-all font-bold">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 outline-none focus:border-blue-500 transition-all font-bold">
            
            <button onclick="handleSubmit()" id="mainBtn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
                دخول 🚀
            </button>
        </div>

        <div class="text-center mt-6">
            <button onclick="toggleMode()" id="toggleBtn" class="text-sm text-gray-600 font-bold hover:text-blue-600 transition-all underline">
                ليس لديك حساب؟ إنشاء حساب جديد
            </button>
        </div>
    </div>

    <script>
        // الربط المباشر ببياناتك الصحيحة (تم تعديلها لك هنا)
        const SUPABASE_URL = "https://rsmrgiyecaoicrqxgize.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzbXJnaXllY2FvaWNycXhnaXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTEzODgsImV4cCI6MjA5MDQ2NzM4OH0.9YafUeTgpnqWNsjokIwzHmM-nEkDH81271t2rdk_2UQ";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('userField').classList.toggle('hidden');
            document.getElementById('formTitle').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
            document.getElementById('mainBtn').innerText = isLoginMode ? "دخول 🚀" : "إنشاء الحساب ✨";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ تسجيل الدخول";
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = document.getElementById('username').value.trim();
            const btn = document.getElementById('mainBtn');

            if (!email || !pass || (!isLoginMode && !user)) {
                alert("يرجى ملء كافة الخانات!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري الاتصال...";

            try {
                if (isLoginMode) {
                    const { data, error } = await _supabase
                        .from('user_profiles')
                        .select('*')
                        .eq('email', email)
                        .eq('password', pass)
                        .single();

                    if (data) {
                        localStorage.setItem('user_session', JSON.stringify(data));
                        window.location.href = 'home-wallet.html'; // تأكد أن هذا الملف موجود
                    } else {
                        alert("بيانات الدخول خاطئة!");
                        resetBtn();
                    }
                } else {
                    const { error } = await _supabase
                        .from('user_profiles')
                        .insert([{ email, password: pass, username: user, balance: 0 }]);

                    if (error) throw error;
                    alert("تم إنشاء الحساب! سجل دخولك الآن.");
                    toggleMode();
                    resetBtn();
                }
            } catch (err) {
                console.error(err);
                alert("حدث خطأ، تأكد من اتصال الإنترنت أو إعدادات القاعدة.");
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.innerText = isLoginMode ? "دخول 🚀" : "إنشاء الحساب ✨";
        }
    </script>
</body>
</html>
