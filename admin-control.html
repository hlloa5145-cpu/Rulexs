<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex | لوحة التحكم السرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; display: none; }
        .admin-card { background: #1e293b; border: 1px solid #334155; border-radius: 25px; }
        .code-box { background: #0f172a; border: 2px dashed #3b82f6; color: #60a5fa; font-family: monospace; }
    </style>
</head>
<body id="adminContent" class="p-6">

    <div class="flex justify-between items-center mb-10 bg-blue-600 p-6 rounded-3xl shadow-2xl shadow-blue-900/20">
        <h1 class="text-2xl font-black tracking-tighter">إدارة ROLEX 👑</h1>
        <button onclick="window.location.href='index.html'" class="text-xs bg-white/10 px-4 py-2 rounded-full font-bold">خروج</button>
    </div>

    <div class="admin-card p-8 mb-8">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-2xl">🔑</span>
            <h3 class="font-bold text-lg text-blue-400 uppercase tracking-widest">توليد مفاتيح الأرباح</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div id="c1" class="code-box p-5 text-center rounded-2xl text-lg font-black uppercase tracking-widest">------</div>
            <div id="c2" class="code-box p-5 text-center rounded-2xl text-lg font-black uppercase tracking-widest">------</div>
            <div id="c3" class="code-box p-5 text-center rounded-2xl text-lg font-black uppercase tracking-widest">------</div>
        </div>

        <button onclick="generateAndSaveCodes()" class="w-full bg-blue-500 hover:bg-blue-600 p-5 rounded-2xl font-bold text-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95">
            تحديث وحفظ في Supabase ⚡
        </button>
    </div>

    <div class="admin-card p-8">
        <h3 class="font-bold mb-6 text-green-400 flex items-center gap-2">💰 طلبات الشحن النشطة</h3>
        <div id="requestsList" class="text-center text-gray-500 py-10">
            <p class="text-xs">لا توجد طلبات جديدة حالياً.</p>
        </div>
    </div>

    <script>
        // التحقق من الهوية قبل عرض الصفحة
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            alert("وصول غير مصرح به!");
            window.location.href = 'login.html';
        } else {
            document.body.style.display = 'block';
        }

        // إعدادات الربط بـ Supabase
        // ملاحظة: استبدل YOUR_ANON_KEY بالمفتاح الخاص بك من إعدادات Supabase
        const SUPABASE_URL = "https://rsmrgiyecaoicrqxgize.supabase.co";
        const SUPABASE_KEY = "YOUR_ANON_KEY"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // وظيفة توليد الأكواد وحفظها
        async function generateAndSaveCodes() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            const makeCode = () => "RX-" + Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            
            const newCodes = [makeCode(), makeCode(), makeCode()];

            // إرسال الأكواد إلى جدول active_codes في Supabase
            const { error } = await _supabase
                .from('active_codes')
                .insert(newCodes.map(c => ({ 
                    code_value: c,
                    is_used: false 
                })));

            if (!error) {
                document.getElementById('c1').innerText = newCodes[0];
                document.getElementById('c2').innerText = newCodes[1];
                document.getElementById('c3').innerText = newCodes[2];
                alert("تم توليد الأكواد وحفظها بنجاح! 🛡️\nالآن أي مستخدم يضع أحد هذه الأكواد سيزيد رصيده.");
            } else {
                console.error(error);
                alert("فشل في الربط مع Supabase: " + error.message);
            }
        }
    </script>
</body>
</html>
